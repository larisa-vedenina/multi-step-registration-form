<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi-Step Registration Form</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <main class="page-container">
      <section class="form-wrapper" aria-labelledby="pageTitle">
        <div class="form-background" aria-hidden="true"></div>

        <div class="form-card" id="formCard">
          <header class="form-header">
            <h1 class="offer-title" id="pageTitle">Registration</h1>
          </header>

          <form class="form-fields" id="mainForm" novalidate>
            <!-- First Name -->
            <div class="field-group">
              <label class="sr-only" for="firstName">First name</label>
              <div class="input-wrapper" id="firstNameWrapper">
                <input
                  type="text"
                  class="form-input"
                  id="firstName"
                  name="firstName"
                  placeholder="First Name"
                  autocomplete="given-name"
                  required
                  aria-describedby="firstNameError"
                  aria-invalid="false"
                />
                <span class="error-text" id="firstNameError" aria-live="polite"></span>
              </div>
            </div>

            <!-- Last Name -->
            <div class="field-group">
              <label class="sr-only" for="lastName">Last name</label>
              <div class="input-wrapper" id="lastNameWrapper">
                <input
                  type="text"
                  class="form-input"
                  id="lastName"
                  name="lastName"
                  placeholder="Last Name"
                  autocomplete="family-name"
                  required
                  aria-describedby="lastNameError"
                  aria-invalid="false"
                />
                <span class="error-text" id="lastNameError" aria-live="polite"></span>
              </div>
            </div>

            <!-- Email -->
            <div class="field-group">
              <label class="sr-only" for="email">Email</label>
              <div class="input-wrapper" id="emailWrapper">
                <input
                  type="email"
                  class="form-input"
                  id="email"
                  name="email"
                  placeholder="E-mail"
                  autocomplete="email"
                  required
                  aria-describedby="emailError"
                  aria-invalid="false"
                />
                <span class="error-text" id="emailError" aria-live="polite"></span>
              </div>
            </div>

            <!-- Phone -->
            <div class="field-group">
              <label class="sr-only" for="phone">Phone number</label>
              <div class="input-wrapper phone-wrapper" id="phoneWrapper">
                <div class="phone-prefix">
                  <button
                    type="button"
                    class="country-selector-btn"
                    id="countryCodeSelect"
                    aria-label="Select country code"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                  >
                    <span class="country-code" id="countryCodeValue">+1</span>
                    <img src="images/arrow.svg" alt="" class="country-arrow" />
                  </button>
                  <span class="separator">|</span>
                </div>
                <input
                  type="tel"
                  class="form-input phone-input"
                  id="phone"
                  name="phone"
                  placeholder="Phone Number"
                  autocomplete="tel"
                  inputmode="tel"
                  required
                  aria-describedby="phoneError"
                  aria-invalid="false"
                />
                <span class="error-text" id="phoneError" aria-live="polite"></span>
                <div class="country-menu" id="countryMenu" hidden role="listbox">
                  <button type="button" class="country-option" data-country="CA" role="option">
                    Canada (+1)
                  </button>
                  <button type="button" class="country-option" data-country="FI" role="option">
                    Finland (+358)
                  </button>
                  <button type="button" class="country-option" data-country="FR" role="option">
                    France (+33)
                  </button>
                  <button type="button" class="country-option" data-country="DE" role="option">
                    Germany (+49)
                  </button>
                  <button type="button" class="country-option" data-country="IT" role="option">
                    Italy (+39)
                  </button>
                  <button type="button" class="country-option" data-country="KZ" role="option">
                    Kazakhstan (+7)
                  </button>
                  <button type="button" class="country-option" data-country="PL" role="option">
                    Poland (+48)
                  </button>
                  <button type="button" class="country-option" data-country="RU" role="option">
                    Russia (+7)
                  </button>
                  <button type="button" class="country-option" data-country="ES" role="option">
                    Spain (+34)
                  </button>
                  <button type="button" class="country-option" data-country="SE" role="option">
                    Sweden (+46)
                  </button>
                  <button type="button" class="country-option" data-country="UA" role="option">
                    Ukraine (+380)
                  </button>
                  <button type="button" class="country-option" data-country="GB" role="option">
                    United Kingdom (+44)
                  </button>
                  <button type="button" class="country-option" data-country="US" role="option">
                    United States (+1)
                  </button>
                </div>
              </div>
            </div>

            <!-- Капча -->
            <section class="captcha-group" id="captchaGroup" hidden aria-labelledby="captchaTitle">
              <h2 class="sr-only" id="captchaTitle">Security check</h2>

              <div class="captcha-wrapper">
                <button
                  type="button"
                  class="refresh-btn"
                  id="refreshCaptcha"
                  aria-label="Generate a new verification code"
                >
                  <img src="images/refresh.svg" alt="" />
                </button>

                <div
                  class="captcha-image"
                  id="captchaText"
                  role="img"
                  aria-live="polite"
                  aria-label="Verification code"
                ></div>

                <div class="captcha-input-wrapper input-wrapper" id="captchaWrapper">
                  <label class="sr-only" for="captchaInput">Verification code</label>
                  <input
                    type="text"
                    class="captcha-input"
                    id="captchaInput"
                    name="captcha"
                    placeholder="Text From Image"
                    inputmode="text"
                    maxlength="6"
                    aria-describedby="captchaError"
                    aria-invalid="false"
                  />
                  <span class="error-text" id="captchaError" aria-live="polite"></span>
                </div>
              </div>
            </section>

            <!-- Загрузка -->
            <div class="loading-group" id="loadingGroup" hidden role="status" aria-live="polite">
              <div class="loading-wrapper">
                <img src="images/points.svg" alt="" class="loading-dots" />
                <span class="sr-only">Preparing the next step...</span>
              </div>
            </div>

            <!-- SMS code -->
            <div class="sms-group" id="smsGroup" hidden>
              <div class="sms-wrapper">
                <div class="sms-description">
                  <span class="line left" aria-hidden="true"></span>
                  <div class="sms-text">
                    Enter the code from SMS
                    <span class="sms-code-note" id="smsCodeNote"></span>
                  </div>
                  <span class="line right" aria-hidden="true"></span>
                </div>

                <div class="sms-input-wrapper input-wrapper" id="smsWrapper">
                  <label class="sr-only" for="smsCode">SMS code</label>
                  <input
                    type="text"
                    class="sms-input"
                    id="smsCode"
                    name="smsCode"
                    placeholder="SMS Code"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    maxlength="4"
                    aria-describedby="smsError"
                    aria-invalid="false"
                  />
                  <span class="error-text" id="smsError" aria-live="polite"></span>
                </div>
              </div>
            </div>

            <p class="status-text sr-only" id="formStatus" role="status" aria-live="polite"></p>

            <!-- Кнопка -->
            <button type="submit" class="submit-btn" id="submitBtn" disabled>
              Register Now
            </button>
          </form>
        </div>
      </section>
    </main>

    <script src="js/form.js"></script>
  </body>
</html>
